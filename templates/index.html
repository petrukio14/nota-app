<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de Notas Fiscais</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
    .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 40px 24px; text-align: center; cursor: pointer; transition: border-color .2s; }
    .upload-area:hover, .upload-area.dragover { border-color: #2563eb; }
    .upload-area p { color: #666; margin-top: 8px; }
    input[type="file"] { display: none; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; font-size: .9rem; cursor: pointer; font-weight: 500; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:disabled { background: #93b4f5; cursor: not-allowed; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #333; }
    .btn-sm { padding: 6px 12px; font-size: .8rem; }
    .btn-block { width: 100%; justify-content: center; }
    .status { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
    .status.success { display: block; background: #dcfce7; color: #166534; }
    .status.error { display: block; background: #fee2e2; color: #991b1b; }
    .status.loading { display: block; background: #e0f2fe; color: #075985; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #075985; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { font-weight: 600; color: #555; }
    .hidden { display: none; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-bar button { padding: 8px 16px; border: 1px solid #e5e7eb; background: #fff; border-radius: 6px; cursor: pointer; font-size: .85rem; }
    .tab-bar button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .tab-bar button:disabled { opacity: .4; cursor: not-allowed; }
    .empty { text-align: center; color: #999; padding: 32px; }
    .file-list { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .file-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 4px; font-size: .8rem; background: #e5e7eb; }
    .nota-card {
      border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 12px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start;
    }
    .nota-card.info { border-left: 4px solid #2563eb; }
    .nota-card.entregue { border-left: 4px solid #16a34a; }
    .nota-card .route-num {
      background: #2563eb; color: #fff; border-radius: 50%; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; flex-shrink: 0;
    }
    .nota-card .body { flex: 1; min-width: 200px; }
    .nota-card .body .field { margin-bottom: 4px; }
    .nota-card .body .field label { font-size: .75rem; color: #888; text-transform: uppercase; }
    .nota-card .body .field .value { font-size: .9rem; }
    .nota-card .actions { display: flex; flex-direction: column; gap: 6px; align-items: stretch; min-width: 140px; }
    .tag-entregue { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75rem; background: #dcfce7; color: #166534; }
    .tag-pendente { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75rem; background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#128196; Leitor de Notas Fiscais
      <span style="font-size:.75rem;font-weight:400;color:#888;margin-left:auto;">
        {{ username }}
        {% if admin %}| <a href="#" onclick="adminPanel()" style="color:#2563eb;text-decoration:none;">Admin</a>{% endif %}
        | <a href="/logout" style="color:#888;text-decoration:none;">Sair</a>
      </span>
    </h1>

    <div class="card">
      <div class="upload-area" id="dropZone">
        <p style="font-size:2rem;margin-bottom:8px;">&#128229;</p>
        <p><strong>Clique para selecionar</strong> ou arraste arquivos</p>
        <p style="font-size:.8rem;color:#999;">PDF, PNG ou JPG — múltiplos arquivos</p>
        <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg" multiple>
      </div>
      <div id="fileList" class="file-list"></div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="btnUpload" disabled>&#9654; Processar PDFs</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <div class="tab-bar">
        <button class="active" data-tab="detail">&#128269; Pendentes</button>
        <button data-tab="list" id="btnHistorico" {% if not pode_historico %}disabled{% endif %}>&#128203; Histórico</button>
      </div>

      <div id="tabDetail">
        <div id="resultArea" class="hidden">
          <div id="notasContainer"></div>
        </div>
        <div id="emptyDetail" class="empty">Nenhuma nota pendente.</div>
      </div>

      <div id="tabList" class="hidden">
        <div style="margin-bottom:12px;display:flex;gap:8px;">
          <input type="text" id="searchNF" placeholder="Buscar por nº da NF..." style="flex:1;padding:8px 12px;border:1px solid #e5e7eb;border-radius:6px;font-size:.85rem;">
          <button class="btn btn-secondary btn-sm" onclick="loadHistory()">Buscar</button>
        </div>
        <table>
          <thead><tr><th>ID</th><th>Usuário</th><th>Cliente</th><th>Endereço</th><th>Nº Nota</th><th>Status</th><th>Data</th><th></th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
        <div id="emptyHistory" class="empty">Nenhuma nota no histórico.</div>
      </div>
    </div>
  </div>

  <script>
    const podeHistorico = {{ 'true' if pode_historico else 'false' }};
    const isAdmin = {{ 'true' if admin else 'false' }};
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const btnUpload = document.getElementById('btnUpload');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const emptyDetail = document.getElementById('emptyDetail');
    const notasContainer = document.getElementById('notasContainer');
    const btnHistorico = document.getElementById('btnHistorico');

    let selectedFiles = [];
    let userNotas = [];
    let currentBatchId = null;
    let currentNotas = [];

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', () => { if(fileInput.files.length) addFiles(fileInput.files); });

    function addFiles(files) {
      for (const f of files) {
        const ext = f.name.split('.').pop().toLowerCase();
        if (!['pdf','png','jpg','jpeg'].includes(ext)) continue;
        if (!selectedFiles.some(ex => ex.name === f.name && ex.size === f.size)) selectedFiles.push(f);
      }
      renderFileList();
    }

    function renderFileList() {
      fileList.innerHTML = selectedFiles.map(f => `<span class="file-tag">${f.name}</span>`).join('');
      btnUpload.disabled = selectedFiles.length === 0;
    }

    async function acordarServidor() {
      for (let i = 0; i < 5; i++) {
        try {
          const r = await fetch('/notas', { signal: AbortSignal.timeout(15000) });
          if (r.ok) return;
        } catch(e) {}
        await new Promise(r => setTimeout(r, 3000));
      }
    }
    acordarServidor();

    btnUpload.addEventListener('click', async () => {
      if (!selectedFiles.length) return;
      btnUpload.disabled = true;
      showStatus('Processando...', 'loading');
      const formData = new FormData();
      for (const f of selectedFiles) formData.append('files', f);
      try {
        const res = await fetch('/upload', { method: 'POST', body: formData, signal: AbortSignal.timeout(120000) });
        const data = await res.json();
        if (!res.ok) { showStatus(data.error || 'Erro', 'error'); return; }
        showStatus(data.message, data.erros?.length ? 'error' : 'success');
        currentBatchId = data.batch_id;
        const novas = data.notas.map((n, i) => ({ ...n, id: n.id || `temp_${i}`, status: 'pendente' }));
        currentNotas = [...currentNotas, ...novas];
        userNotas = [...userNotas, ...novas];
        renderNotas(getPendentes());
        selectedFiles = []; renderFileList();
      } catch (err) {
        if (err.name === 'TimeoutError') {
          showStatus('Tempo limite excedido. O PDF pode ser muito grande ou a IA demorou demais.', 'error');
        } else {
          showStatus('Erro: ' + err.message, 'error');
        }
      }
      btnUpload.disabled = false;
    });

    function getPendentes() {
      return userNotas.filter(n => n.status === 'pendente');
    }

    function renderNotas(notas) {
      if (!notas.length) {
        resultArea.classList.add('hidden');
        emptyDetail.classList.remove('hidden');
        emptyDetail.textContent = 'Nenhuma nota pendente.';
        if (userNotas.length > 0) {
          emptyDetail.textContent = 'Todas as notas foram entregues!';
        }
        notasContainer.innerHTML = '';
        return;
      }
      resultArea.classList.remove('hidden');
      emptyDetail.classList.add('hidden');
      let html = `<p style="font-size:.85rem;color:#666;margin-bottom:12px;">${notas.length} nota(s) pendente(s) — adicione o canhoto de entrega</p>`;
      let idx = 0;
      notas.forEach(n => {
        const index = userNotas.findIndex(u => u.id === n.id);
        const statusClass = n.status === 'entregue' ? 'tag-entregue' : 'tag-pendente';
        const statusLabel = n.status === 'entregue' ? 'Entregue' : 'Pendente';
        const canhotoLink = n.canhoto_url ? `<a href="${n.canhoto_url}" target="_blank" style="font-size:.75rem;">&#128247; Ver Canhoto</a>` : '';
        const cardClass = n.status === 'entregue' ? 'nota-card entregue' : 'nota-card info';
        html += `
          <div class="${cardClass}" data-index="${index}">
            <div class="route-num">${++idx}</div>
            <div class="body">
              <div class="field"><label>Cliente:</label> <span class="value">${n.nome_cliente || '-'}</span></div>
              <div class="field"><label>Endereço:</label> <span class="value">${n.endereco || '-'}</span></div>
              <div class="field"><label>Nº NF:</label> <span class="value">${n.numero_nota || '-'}</span></div>
              <div style="margin-top:6px;">
                <span class="${statusClass}">${statusLabel}</span>
                ${canhotoLink ? ' | ' + canhotoLink : ''}
              </div>
            </div>
            ${n.status === 'pendente' ? `
            <div class="actions">
              <label class="btn btn-secondary btn-sm btn-block" style="cursor:pointer;text-align:center;">
                &#128247; Foto Canhoto
                <input type="file" accept="image/png,image/jpg,image/jpeg" style="display:none" onchange="uploadCanhoto(${typeof n.id === 'number' ? n.id : 0}, this, ${index})">
              </label>
            </div>` : ''}
          </div>`;
      });
      notasContainer.innerHTML = html;
      atualizarBotoes();
    }

    function atualizarBotoes() {
      const pendentes = getPendentes().length;
      btnHistorico.disabled = pendentes > 0 || !podeHistorico;
    }

    window.uploadCanhoto = async function(notaId, input, index) {
      if (!input.files.length) return;
      const file = input.files[0];
      const formData = new FormData();
      formData.append('file', file);
      try {
        const res = await fetch(`/upload-canhoto/${notaId}`, { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) { alert('Erro: ' + data.error); return; }
        if (userNotas[index]) {
          userNotas[index].status = 'entregue';
          userNotas[index].canhoto_url = data.canhoto_url;
        }
        renderNotas(getPendentes());
        // se todas entregues, avisa
        if (getPendentes().length === 0 && podeHistorico) {
          showStatus('Todas as notas foram entregues! Acesse o Histórico.', 'success');
        }
      } catch(e) { alert('Erro: ' + e.message); }
    };

    function showStatus(msg, type) {
      status.className = 'status ' + type;
      if (type === 'loading') status.innerHTML = `<span class="spinner"></span>${msg}`;
      else status.textContent = msg;
    }

    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchTab(btn.dataset.tab);
      });
    });

    function switchTab(tab) {
      document.getElementById('tabDetail').classList.toggle('hidden', tab !== 'detail');
      document.getElementById('tabList').classList.toggle('hidden', tab !== 'list');
      if (tab === 'list') loadHistory();
    }

    async function loadHistory() {
      try {
        const q = document.getElementById('searchNF').value.trim();
        const url = q ? `/notas/busca?q=${encodeURIComponent(q)}` : '/historico';
        const res = await fetch(url);
        if (res.status === 403) { return; }
        const list = await res.json();
        const tbody = document.getElementById('historyBody');
        const empty = document.getElementById('emptyHistory');
        tbody.innerHTML = '';
        if (!list.length) { empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');
        list.forEach(n => {
          const st = n.status === 'entregue'
            ? '<span class="tag-entregue">Entregue</span>'
            : '<span class="tag-pendente">Pendente</span>';
          const links = [];
          if (n.canhoto_url) links.push(`<a href="${n.canhoto_url}" target="_blank" style="font-size:.7rem;">Canhoto</a>`);
          const acoes = [`<button class="btn btn-secondary btn-sm" onclick="viewNota(${n.id})" style="margin-left:4px;">Ver</button>`];
          if (isAdmin) acoes.push(`<button class="btn btn-secondary btn-sm" onclick="deletarNota(${n.id})" style="margin-left:4px;color:#991b1b;">Excluir</button>`);
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${n.id}</td><td>${n.username || '-'}</td><td>${n.nome_cliente || '-'}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n.endereco || '-'}</td><td>${n.numero_nota || '-'}</td><td>${st}</td><td>${n.created_at}</td><td>${links.join(' | ')}${acoes.join('')}</td>`;
          tbody.appendChild(tr);
        });
      } catch(e) {}
    }

    document.getElementById('searchNF').addEventListener('keydown', e => { if (e.key === 'Enter') loadHistory(); });

    window.viewNota = async function(id) {
      try {
        const res = await fetch('/notas/' + id);
        const data = await res.json();
        // adiciona/atualiza na lista do usuario se pertencer a ele
        const idx = userNotas.findIndex(n => n.id === id);
        if (idx >= 0) {
          userNotas[idx] = { ...userNotas[idx], ...data };
        } else if (data.username === '{{ username }}') {
          userNotas.push(data);
        }
        renderNotas(getPendentes());
        switchTab('detail');
      } catch(e) {}
    };

    async function carregarMinhasNotas() {
      try {
        const res = await fetch('/notas');
        const list = await res.json();
        userNotas = list;
        renderNotas(getPendentes());
      } catch(e) {}
    }
    carregarMinhasNotas();

    window.deletarNota = async function(id) {
      if (!confirm('Excluir esta nota permanentemente?')) return;
      try {
        const res = await fetch('/admin/nota/' + id, { method: 'DELETE' });
        const data = await res.json();
        alert(data.message || data.error);
        if (res.ok) loadHistory();
      } catch(e) { alert('Erro: ' + e.message); }
    };

    window.adminPanel = async function() {
      const res = await fetch('/admin/usuarios');
      const usuarios = await res.json();
      let html = '<h3 style="margin-bottom:12px;">Gerenciar Usuários</h3>';
      html += '<table style="font-size:.85rem;margin-bottom:16px;"><thead><tr><th>ID</th><th>Usuário</th><th>Admin</th><th>Ver Histórico</th><th></th></tr></thead><tbody>';
      usuarios.forEach(u => {
        const hist = u.pode_historico ? 'Sim' : 'Não';
        html += `<tr><td>${u.id}</td><td>${u.username}</td><td>${u.admin ? 'Sim' : 'Não'}</td><td>${hist}</td><td>${u.admin ? '' : '<button class="btn btn-secondary btn-sm" onclick="deletarUsuario('+u.id+')">Remover</button>'}</td></tr>`;
      });
      html += '</tbody></table>';
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;"><input type="text" id="novoUser" placeholder="Usuário" style="padding:8px;border:1px solid #e5e7eb;border-radius:6px;"><input type="password" id="novaSenha" placeholder="Senha" style="padding:8px;border:1px solid #e5e7eb;border-radius:6px;"><label style="display:flex;align-items:center;gap:4px;font-size:.85rem;"><input type="checkbox" id="novoPodeHistorico"> Ver Histórico</label><button class="btn btn-primary btn-sm" onclick="criarUsuario()">Criar</button></div>';
      mostrarModal(html);
    };

    window.mostrarModal = function(html) {
      let div = document.getElementById('modal');
      if (!div) {
        div = document.createElement('div');
        div.id = 'modal';
        div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;';
        div.addEventListener('click', e => { if (e.target === div) div.remove(); });
        document.body.appendChild(div);
      }
      div.innerHTML = `<div style="background:#fff;border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow:auto;">${html}</div>`;
    };

    window.criarUsuario = async function() {
      const username = document.getElementById('novoUser').value.trim();
      const password = document.getElementById('novaSenha').value.trim();
      const podeHistorico = document.getElementById('novoPodeHistorico').checked;
      if (!username || !password) { alert('Preencha usuário e senha'); return; }
      const res = await fetch('/admin/usuarios', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password, pode_historico: podeHistorico}),
      });
      const data = await res.json();
      alert(data.message || data.error);
      if (res.ok) adminPanel();
    };

    window.deletarUsuario = async function(id) {
      if (!confirm('Remover usuário?')) return;
      const res = await fetch('/admin/usuarios/' + id, { method: 'DELETE' });
      const data = await res.json();
      alert(data.message || data.error);
      adminPanel();
    };
  </script>
</body>
</html>
